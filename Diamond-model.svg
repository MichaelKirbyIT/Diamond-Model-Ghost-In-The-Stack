<svg width="100%" viewBox="0 0 900 1600" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Chained Diamond Model — Operation Greenfield</title>
<desc>Five diamonds chained by shared vertices tracing the intrusion chain from initial access to retreat.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th  { font-size: 14px; font-weight: 500; fill: #3d3d3a; }
    .ts  { font-size: 12px; fill: #73726c; }
    .label { font-size: 13px; font-weight: 500; fill: #3d3d3a; }
    .edge  { fill: none; stroke: #c8c6be; stroke-width: 1; }
    .edge-dash { fill: none; stroke: #c8c6be; stroke-width: 1; stroke-dasharray: 8 5; }
    .link  { fill: none; stroke-width: 2; stroke-dasharray: 5 4; }
    .dot-adv  { fill: #FAECE7; stroke: #993C1D; stroke-width: 1; }
    .dot-infra { fill: #E6F1FB; stroke: #185FA5; stroke-width: 1; }
    .dot-cap  { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 1; }
    .dot-vic  { fill: #FAEEDA; stroke: #854F0B; stroke-width: 1; }
    .dot-neu  { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 1; }
    .dot-shared { stroke-width: 2.5; }
    .face-adv  { fill: #FAECE7; opacity: 0.35; }
    .face-infra { fill: #E6F1FB; opacity: 0.35; }
    .face-cap  { fill: #E1F5EE; opacity: 0.35; }
    .face-vic  { fill: #FAEEDA; opacity: 0.35; }
    .note { font-size: 11px; fill: #888780; }
    .event { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  </style>
</defs>

<!-- LEGEND -->
<circle cx="44" cy="22" r="6" class="dot-adv"/>
<text class="ts" x="56" y="27">Adversary</text>
<circle cx="154" cy="22" r="6" class="dot-infra"/>
<text class="ts" x="166" y="27">Infrastructure</text>
<circle cx="294" cy="22" r="6" class="dot-cap"/>
<text class="ts" x="306" y="27">Capability</text>
<circle cx="404" cy="22" r="6" class="dot-vic"/>
<text class="ts" x="416" y="27">Victim</text>
<circle cx="494" cy="22" r="6" class="dot-neu"/>
<text class="ts" x="506" y="27">Severed</text>

